appId: com.openclawwin.app
productName: OpenClaw-Win
directories:
  buildResources: build
npmRebuild: true
nodeGypRebuild: false
buildDependenciesFromSource: false
files:
  - dist
  - dist-electron
  - package.json
  - "!node_modules/@shipany/open-agent-sdk/src/**"
  - "!node_modules/**/{test,tests,__tests__,docs,example,examples}/**"
  - "!node_modules/**/*.{ts,tsx,map,md}"
asar: true
asarUnpack:
  - "node_modules/@shipany/open-agent-sdk/**"
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
        - arm64
    - target: portable
      arch:
        - x64
  artifactName: "${productName}-${version}-${os}-${arch}.${ext}"
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: OpenClaw-Win
mac:
  icon: build/icon.icns
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.developer-tools
linux:
  icon: build/icon.png
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Development
