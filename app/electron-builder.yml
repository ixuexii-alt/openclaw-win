appId: com.openclaw.win
productName: OpenClaw
directories:
  buildResources: build
  output: dist
files:
  - "**/*"
  - "!**/*.{ts,map}"
mac:
  icon: build/icon.icns
  target:
    - target: dmg
      arch:
        - arm64
        - x64
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
        - arm64
    - target: portable
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: OpenClaw
linux:
  icon: build/icon.png
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Development
